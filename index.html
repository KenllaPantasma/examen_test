<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Forestal - Panel de Tests</title>
    <link rel="stylesheet" href="css/dashboard-style.css">
</head>

<body>

    <div class="dashboard-container">
        <header class="main-header">
            <h1>Preparación Ingenieros Técnicos Forestales</h1>
            <p>Selecciona un módulo o examen para comenzar la simulación</p>
        </header>

        <section class="exam-highlight">
            <div class="card premium" onclick="irAlTest('EXAMEN_2025')">
                <div class="card-content">
                    <span class="badge">OFICIAL</span>
                    <h2>Examen Real 2025</h2>
                    <p>Simulacro completo con preguntas de reserva (Pregunta 5 anulada).</p>
                    <button class="btn-start">Iniciar Examen</button>
                </div>
            </div>
        </section>

        <div class="modules-grid" id="modules-menu"></div>
    </div>

    <script>
        const totalModulos = 9;
        const grid = document.getElementById('modules-menu');

        // Generar los módulos
        for (let i = 1; i <= totalModulos; i++) {
            const moduleCard = document.createElement('div');
            moduleCard.className = 'module-card';
            moduleCard.innerHTML = `
        <h3>Módulo ${i}</h3>
        <div class="test-row">
            <div class="test-group">
                <button onclick="irAlTest('m${i}_t1')">Test 1</button>
                <button class="btn-info" onclick="verTemas('m${i}_t1')">ℹ️</button>
            </div>
            <div class="test-group">
                <button onclick="irAlTest('m${i}_t2')">Test 2</button>
                <button class="btn-info" onclick="verTemas('m${i}_t2')">ℹ️</button>
            </div>
        </div>
    `;
            grid.appendChild(moduleCard);
        }

        function irAlTest(id) {
            window.location.href = `simulador.html#${id}`;
        }

        // NUEVA FUNCIÓN: Carga el JS temporalmente para leer el temario
        function verTemas(testId) {
    window.informacionTest = null;
    const tempScript = document.createElement('script');
    tempScript.src = `js/${testId}.js?v=${new Date().getTime()}`;
    
    tempScript.onload = () => {
        if (window.informacionTest && window.informacionTest.temario) {
            const info = window.informacionTest.temario;
            let mensaje = `📋 ${window.informacionTest.titulo.toUpperCase()}\n\n`;

            // Si existen temas generales
            if (info.general && info.general.length > 0) {
                mensaje += `🔹 TEMARIO GENERAL:\n` + info.general.map(t => `  • ${t}`).join('\n') + `\n\n`;
            }

            // Si existen temas específicos
            if (info.especifico && info.especifico.length > 0) {
                mensaje += `🔸 TEMARIO ESPECÍFICO:\n` + info.especifico.map(t => `  • ${t}`).join('\n');
            }

            alert(mensaje);
        } else {
            alert("Información de temario no disponible.");
        }
        tempScript.remove();
    };
    
    tempScript.onerror = () => {
        alert("Error al cargar el archivo.");
        tempScript.remove();
    };
    document.head.appendChild(tempScript);
}
    </script>
</body>

</html>
