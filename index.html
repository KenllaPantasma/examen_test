<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Forestal - Panel de Tests</title>
    <link rel="stylesheet" href="css/dashboard-style.css">
</head>

<body>

    <div class="dashboard-container">
        <header class="main-header">
            <h1>Preparación Ingenieros Técnicos Forestales</h1>
            <p>Selecciona un módulo o examen para comenzar la simulación</p>
        </header>

        <section class="exam-highlight">
            <div class="card premium" onclick="irAlTest('EXAMEN_2025')">
                <div class="card-content">
                    <span class="badge">OFICIAL</span>
                    <h2>Examen Real 2025</h2>
                    <p>Simulacro completo con preguntas de reserva (Pregunta 5 anulada).</p>
                    <button class="btn-start">Iniciar Examen</button>
                </div>
            </div>
        </section>

        <div class="modules-grid" id="modules-menu"></div>

        <div id="download-container" style="text-align: center; margin: 20px 0; display: none;">
            <a id="download-link" href="#" class="btn-start"
                style="background-color: #2c5d3f; text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 8px; color: white;"
                download>
                <span id="download-text">📥 Descargar PDF</span>
            </a>
        </div>

        <h2 style="margin-top: 40px; color: var(--forest-dark);">Temario General (Tests por Tema)</h2>
        <div class="modules-grid">
            <div class="module-card">
                <h3>Tema 13</h3>
                <p>Transparencia y LOPDGDD</p>
                <div class="test-row">
                    <div class="test-group">
                        <button onclick="irAlTest('test_G_13')">Iniciar Test</button>
                        <button class="btn-info" onclick="verTemas('test_G_13')">ℹ️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const totalModulos = 9;
        const grid = document.getElementById('modules-menu');

        // Generar los módulos
        for (let i = 1; i <= totalModulos; i++) {
            const moduleCard = document.createElement('div');
            moduleCard.className = 'module-card';
            moduleCard.innerHTML = `
        <h3>Módulo ${i}</h3>
        <div class="test-row">
            <div class="test-group">
                <button onclick="irAlTest('m${i}_t1')">Test 1</button>
                <button class="btn-info" onclick="verTemas('m${i}_t1')">ℹ️</button>
            </div>
            <div class="test-group">
                <button onclick="irAlTest('m${i}_t2')">Test 2</button>
                <button class="btn-info" onclick="verTemas('m${i}_t2')">ℹ️</button>
            </div>
        </div>
    `;
            grid.appendChild(moduleCard);
        }

        function irAlTest(id) {
            window.location.href = `simulador.html#${id}`;
        }

        // NUEVA FUNCIÓN: Carga el JS temporalmente para leer el temario
        function verTemas(testId) {
            window.informacionTest = null;
            const tempScript = document.createElement('script');
            tempScript.src = `js/${testId}.js?v=${new Date().getTime()}`;

            tempScript.onload = () => {
                const container = document.getElementById('download-container');
                const link = document.getElementById('download-link');
                const text = document.getElementById('download-text');

                if (window.informacionTest) {
                    // 1. Personalizamos el botón con el nombre del módulo/test
                    const nombreTest = window.informacionTest.titulo || testId;
                    text.innerHTML = `📥 Descargar PDF: ${nombreTest}`;
                    link.href = `pdf/${testId}.pdf`;
                    container.style.display = 'block';

                    // 2. Preparamos el mensaje del alert
                    const info = window.informacionTest.temario;
                    let mensaje = `📋 ${nombreTest.toUpperCase()}\n\n`;

                    if (info && info.general && info.general.length > 0) {
                        mensaje += `🔹 GENERAL:\n` + info.general.map(t => `  • ${t}`).join('\n') + `\n\n`;
                    }
                    if (info && info.especifico && info.especifico.length > 0) {
                        mensaje += `🔸 ESPECÍFICO:\n` + info.especifico.map(t => `  • ${t}`).join('\n');
                    }

                    alert(mensaje);
                } else {
                    // Si el JS no tiene el objeto informacionTest, usamos el ID del test como nombre
                    text.innerHTML = `📥 Descargar PDF: ${testId}`;
                    link.href = `pdf/${testId}.pdf`;
                    container.style.display = 'block';
                    alert("Información de temario detallada no disponible, pero puedes descargar el PDF.");
                }
                tempScript.remove();
            };

            tempScript.onerror = () => {
                document.getElementById('download-container').style.display = 'none';
                alert("No se encontró información para este test.");
                tempScript.remove();
            };
            document.head.appendChild(tempScript);
        }
    </script>
</body>

</html>
