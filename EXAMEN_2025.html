<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Oposiciones Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 30px; padding-bottom: 15px; }
        
        .pregunta-card { margin-bottom: 25px; padding: 20px; border: 1px solid #eee; border-radius: 8px; transition: 0.3s; }
        .enunciado { font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 15px; }
        /* Si una de las preguntas tiene una imagen, este es su estilo */
        .pregunta-imagen {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .opciones { list-style: none; padding: 0; }
        .opcion-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border: 1px solid #f0f0f0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .opcion-item:hover { background-color: #f8f9fa; }
        .opcion-item input { margin-right: 15px; transform: scale(1.3); cursor: pointer; }

        /* Estilos tras corregir */
        .corregido .es-correcta { background-color: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .corregido .seleccionada.es-incorrecta { background-color: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }

        #resultado-panel { display: none; margin-top: 30px; padding: 30px; background: var(--primary); color: white; border-radius: 10px; text-align: center; animation: fadeIn 0.5s; }
        .nota-grande { font-size: 4rem; font-weight: bold; display: block; margin: 10px 0; color: #f1c40f; }
        
        .btn-finalizar { display: block; width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-finalizar:hover { background: #1a252f; transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Simulacro 1</h1>
        <p>Acierto: <strong>+1</strong> | Fallo: <strong>-0.25</strong> | Blanco: <strong>0</strong></p>
    </header>

    <div id="quiz-container">
        </div>

    <button class="btn-finalizar" id="btn-submit" onclick="corregirExamen()">Finalizar y Ver Calificación</button>

    <div id="resultado-panel">
        <h2>Tu Calificación Final</h2>
        <span class="nota-grande" id="nota-display">0.00</span>
        <p id="desglose-display" style="font-size: 1.2rem;"></p>
        <button onclick="location.reload()" style="background: white; color: var(--primary); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px;">
            Reiniciar Simulacro
        </button>
    </div>
</div>

<script src="EXAMEN_2025.js"></script>

<script>
    // Inyectar preguntas al cargar la página
    function cargarPreguntas() {
        const container = document.getElementById('quiz-container');
        bancoDePreguntas.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'pregunta-card';
            card.id = `pregunta-${p.id}`;
            
            // --- NUEVA LÓGICA DE IMAGEN ---
            let imagenHTML = '';
            if (p.imagen) {
                // Asegúrate de que los archivos .png estén en la misma carpeta que el HTML
                imagenHTML = `<img src="${p.imagen}" class="pregunta-imagen" alt="Imagen pregunta ${p.id}">`;
            }
            // ------------------------------

            let opcionesHTML = '';
            for (const letra in p.opciones) {
                opcionesHTML += `
                    <label class="opcion-item">
                        <input type="radio" name="p${p.id}" value="${letra}">
                        <span>${letra.toUpperCase()}. ${p.opciones[letra]}</span>
                    </label>
                `;
            }

            card.innerHTML = `
                <span class="enunciado">${index + 1}. ${p.enunciado}</span>
                ${imagenHTML} 
                <div class="opciones">${opcionesHTML}</div>
            `;
            container.appendChild(card);
        });
    }

    function corregirExamen() {
        let aciertos = 0;
        let fallos = 0;
        let blancos = 0;

        bancoDePreguntas.forEach(p => {
            const card = document.getElementById(`pregunta-${p.id}`);
            const seleccionada = card.querySelector(`input[name="p${p.id}"]:checked`);
            const labels = card.querySelectorAll('.opcion-item');

            // Marcar correcta y error visualmente
            labels.forEach(label => {
                const radio = label.querySelector('input');
                if (radio.value === p.correcta) {
                    label.classList.add('es-correcta');
                }
                if (seleccionada && radio.checked && radio.value !== p.correcta) {
                    label.classList.add('seleccionada', 'es-incorrecta');
                }
            });

            if (!seleccionada) {
                blancos++;
            } else if (seleccionada.value === p.correcta) {
                aciertos++;
            } else {
                fallos++;
            }
        });

        // Cálculo de nota
        const nota = Math.max(0, (aciertos * 1) - (fallos * 0.25));
        
        // Mostrar resultados
        document.getElementById('btn-submit').style.display = 'none';
        document.getElementById('quiz-container').classList.add('corregido');
        const panel = document.getElementById('resultado-panel');
        panel.style.display = 'block';
        document.getElementById('nota-display').textContent = nota.toFixed(2);
        document.getElementById('desglose-display').innerHTML = 
            `Aciertos: <strong>${aciertos}</strong> | Fallos: <strong>${fallos}</strong> | Blancos: <strong>${blancos}</strong>`;
        
        panel.scrollIntoView({ behavior: 'smooth' });
    }

    // Ejecutar carga al abrir
    window.onload = cargarPreguntas;
</script>

</body>
</html>
