<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador IT Forestales 2025</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="timer-sticky">Tiempo: <span id="timer">00:00:00</span></div>

    <div class="container">
        <header>
            <h1>Simulador Examen IT Forestales 2025</h1>
            <p>Modelo A - Cuerpo de Ingenieros Técnicos Forestales</p>
            <div class="info-alert">
                Nota: La pregunta 5 ha sido anulada. El sistema usará automáticamente la pregunta 101 (Reserva) para el
                cálculo.
            </div>
        </header>

        <div id="quiz-container">
        </div>

        <div id="resultado-panel" class="hidden">
            <h3>Resultado del examen</h3>
            <div class="score-box">
                <span class="label">Nota Final:</span>
                <span id="nota-display" class="value">0.00</span>
                <span class="total">/ 100</span>
            </div>
            <p id="desglose-display"></p>
            <button onclick="window.location.reload()" class="btn-reload">Reiniciar Test</button>
        </div>

        <div class="footer-actions">
            <button id="btn-submit" onclick="corregirExamen()">Finalizar y Corregir</button>
        </div>
    </div>

    <script src="js/EXAMEN_2025.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
